name: Release
permissions: write-all

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - "extension/**"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            SHORT=$(git rev-parse --short HEAD)
            echo "VERSION=pre-release-${SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Package extension
        run: |
          cd extension
          zip -r ../XuexitongJSFork-extension-${{ steps.version.outputs.VERSION }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: XuexitongJSFork-extension-${{ steps.version.outputs.VERSION }}.zip

  pre-release:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')) ||
      github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: bin/

      - name: Delete current pre-release assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: pre-release
          deleteOnlyFromDrafts: false

      - name: Update pre-release tag
        uses: richardsimko/update-tag@v1
        with:
          tag_name: pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: Pre-release
          body: |
            > ⚠️ 这是自动构建的预发布版本，对应 commit: ${{ github.sha }}

            **安装方式(Edge / Chrome):**
            1. 下载 zip 并解压
            2. 打开 `edge://extensions/` 开启开发者模式
            3. 加载已解压的扩展程序 -> 选解压后的文件夹
          files: bin/*
          prerelease: true

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension
          path: bin/

      - name: Delete current release assets
        uses: 8Mi-Tech/delete-release-assets-action@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ needs.build.outputs.version }}
          deleteOnlyFromDrafts: false

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: bin/*
          prerelease: false
